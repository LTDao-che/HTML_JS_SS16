<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <div class="container">
      <header>👥 Quản Lý Nhân Viên</header>
      <section class="form-section">
        <h2 id="formTitle">Thêm Nhân Viên Mới</h2>
        <form id="employeeForm">
          <div class="form-grid">
            <div>
              <label>Họ và Tên <span>*</span></label>
              <input type="text" id="fullName" placeholder="Nhập họ và tên..."/>
            </div>

            <div>
              <label>Ngày Sinh <span>*</span></label>
              <input type="date" id="dob"/>
            </div>

            <div>
              <label>Email <span>*</span></label>
              <input type="text" id="email" placeholder="example@email.com"/>
            </div>

            <div>
              <label>Địa Chỉ <span>*</span></label>
              <input type="text" id="address" placeholder="Nhập địa chỉ..."/>
            </div>
          </div>

          <div class="button-group">
            <button type="submit" id="submitBtn">+ Thêm Nhân Viên</button>
            <button type="button" id="cancelBtn" class="cancel-btn hidden">Hủy</button>
          </div>
        </form>
      </section>
      <section class="list-section">
        <h2>Danh Sách Nhân Viên</h2>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>HỌ VÀ TÊN</th>
                <th>NGÀY SINH</th>
                <th>EMAIL</th>
                <th>ĐỊA CHỈ</th>
                <th>THAO TÁC</th>
              </tr>
            </thead>
            <tbody id="employeeTableBody"></tbody>
          </table>
        </div>
      </section>
      <footer>Tổng số nhân viên: <span id="totalEmployees">0</span></footer>
    </div>
    <script src="./script.js"></script>
  </body>
</html>
